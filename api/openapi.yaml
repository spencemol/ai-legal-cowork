openapi: 3.1.0
info:
  title: Legal AI Cowork — REST API
  version: 1.0.0
  description: |
    Node/Fastify REST API for the Legal AI desktop application.
    Provides authentication, matter management, client management,
    document registration, and conversation/message tracking with
    strict matter-level and role-based access control.

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
  - name: Auth
  - name: Matters
  - name: Clients
  - name: Documents
  - name: Conversations

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # -------------------------------------------------------------------------
  # Reusable schemas
  # -------------------------------------------------------------------------
  schemas:

    # --- Error responses ---------------------------------------------------
    Error:
      type: object
      required: [message]
      properties:
        message:
          type: string

    ValidationError:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
          example: Validation error
        errors:
          type: array
          items:
            type: object
            description: Zod issue

    # --- Enums -------------------------------------------------------------
    UserRole:
      type: string
      enum: [attorney, paralegal, partner]

    MatterStatus:
      type: string
      enum: [active, closed, archived]

    AccessLevel:
      type: string
      enum: [full, restricted, read_only]

    ClientRole:
      type: string
      enum: [plaintiff, defendant, third_party, other]

    DocumentStatus:
      type: string
      enum: [pending, processing, indexed, failed]

    MessageRole:
      type: string
      enum: [user, assistant]

    SourceType:
      type: string
      enum: [internal, web, legal_db]

    # --- Domain objects ----------------------------------------------------
    User:
      type: object
      required: [id, email, name, role, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        created_at:
          type: string
          format: date-time

    Matter:
      type: object
      required: [id, title, case_number, status, created_by_id, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        case_number:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/MatterStatus'
        created_by_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MatterAssignment:
      type: object
      required: [matter_id, user_id, access_level]
      properties:
        matter_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        access_level:
          $ref: '#/components/schemas/AccessLevel'
        user:
          $ref: '#/components/schemas/User'

    Client:
      type: object
      required: [id, name, role, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        contact_email:
          type: string
          format: email
          nullable: true
        contact_phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/ClientRole'
        created_at:
          type: string
          format: date-time

    Document:
      type: object
      required: [id, matter_id, file_name, file_path, file_size, mime_type, sha256_hash, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        matter_id:
          type: string
          format: uuid
        file_name:
          type: string
        file_path:
          type: string
        file_size:
          type: integer
        mime_type:
          type: string
        sha256_hash:
          type: string
        status:
          $ref: '#/components/schemas/DocumentStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Conversation:
      type: object
      required: [id, matter_id, title, created_by_id, created_at]
      properties:
        id:
          type: string
          format: uuid
        matter_id:
          type: string
          format: uuid
        title:
          type: string
        created_by_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    ConversationWithMessages:
      allOf:
        - $ref: '#/components/schemas/Conversation'
        - type: object
          required: [messages]
          properties:
            messages:
              type: array
              items:
                $ref: '#/components/schemas/Message'

    Citation:
      type: object
      required: [doc_id, chunk_id, text_snippet]
      properties:
        doc_id:
          type: string
          format: uuid
        chunk_id:
          type: string
        text_snippet:
          type: string
        page:
          type: integer
          nullable: true
        file_name:
          type: string
        source_type:
          $ref: '#/components/schemas/SourceType'

    Message:
      type: object
      required: [id, conversation_id, role, content, created_at]
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/MessageRole'
        content:
          type: string
        citations:
          type: array
          items:
            $ref: '#/components/schemas/Citation'
        created_at:
          type: string
          format: date-time

    Tokens:
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token:
          type: string
          description: JWT valid for 1 hour
        refresh_token:
          type: string
          description: JWT valid for 7 days

    MatterClientLink:
      type: object
      required: [matter_id, client_id]
      properties:
        matter_id:
          type: string
          format: uuid
        client_id:
          type: string
          format: uuid

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:

  # =========================================================================
  # Health
  # =========================================================================
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp]
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  # =========================================================================
  # Auth
  # =========================================================================
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name, role]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
                  minLength: 1
                role:
                  $ref: '#/components/schemas/UserRole'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 1
      responses:
        '200':
          description: Authenticated — returns JWT tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tokens'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                required: [id, email, role]
                properties:
                  id:
                    type: string
                    format: uuid
                  email:
                    type: string
                    format: email
                  role:
                    $ref: '#/components/schemas/UserRole'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/sso/config:
    get:
      tags: [Auth]
      summary: Get SSO/OIDC configuration
      operationId: getSsoConfig
      responses:
        '200':
          description: SSO configuration
          content:
            application/json:
              schema:
                type: object
                required: [sso_enabled, strategy]
                properties:
                  sso_enabled:
                    type: boolean
                  provider:
                    type: string
                    nullable: true
                  strategy:
                    type: string
                    enum: [password, oidc]

  /auth/sso/callback:
    post:
      tags: [Auth]
      summary: SSO/OIDC callback — exchange ID token for JWT
      operationId: ssoCallback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_token]
              properties:
                id_token:
                  type: string
                  description: OIDC ID token from the identity provider
      responses:
        '200':
          description: Authenticated — returns JWT tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tokens'
        '401':
          description: Invalid or expired ID token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # =========================================================================
  # Matters
  # =========================================================================
  /matters:
    post:
      tags: [Matters]
      summary: Create a matter
      description: Requires `attorney` or `partner` role.
      operationId: createMatter
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, case_number]
              properties:
                title:
                  type: string
                  minLength: 1
                case_number:
                  type: string
                  minLength: 1
                description:
                  type: string
                status:
                  $ref: '#/components/schemas/MatterStatus'
      responses:
        '201':
          description: Matter created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Matter'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags: [Matters]
      summary: List all matters
      operationId: listMatters
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of matters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Matter'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /matters/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags: [Matters]
      summary: Get a matter by ID
      description: Requires matter assignment (partners bypass).
      operationId: getMatter
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Matter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Matter'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Not assigned to matter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Matter not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      tags: [Matters]
      summary: Update a matter
      description: Requires write access on the matter.
      operationId: updateMatter
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                case_number:
                  type: string
                  minLength: 1
                description:
                  type: string
                status:
                  $ref: '#/components/schemas/MatterStatus'
      responses:
        '200':
          description: Updated matter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Matter'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Matter not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /matters/{id}/assignments:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      tags: [Matters]
      summary: Assign a user to a matter
      description: Requires `attorney` or `partner` role and matter access.
      operationId: createMatterAssignment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
                  format: uuid
                access_level:
                  $ref: '#/components/schemas/AccessLevel'
      responses:
        '201':
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatterAssignment'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags: [Matters]
      summary: List users assigned to a matter
      operationId: listMatterAssignments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of assignments with user details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MatterAssignment'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /matters/{id}/assignments/{userId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [Matters]
      summary: Remove a user from a matter
      description: Requires `attorney` or `partner` role.
      operationId: deleteMatterAssignment
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Assignment removed
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Assignment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # =========================================================================
  # Clients
  # =========================================================================
  /clients:
    post:
      tags: [Clients]
      summary: Create a client
      operationId: createClient
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                contact_email:
                  type: string
                  format: email
                contact_phone:
                  type: string
                address:
                  type: string
                role:
                  $ref: '#/components/schemas/ClientRole'
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /clients/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Clients]
      summary: Get a client by ID
      operationId: getClient
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Client not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /matters/{id}/clients:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      tags: [Clients]
      summary: Link a client to a matter
      description: Requires write access on the matter.
      operationId: linkClientToMatter
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [client_id]
              properties:
                client_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Client linked to matter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatterClientLink'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags: [Clients]
      summary: List clients for a matter
      operationId: listClientsForMatter
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /matters/{id}/clients/{clientId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: clientId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [Clients]
      summary: Unlink a client from a matter
      description: Requires write access on the matter.
      operationId: unlinkClientFromMatter
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Client unlinked
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Link not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # =========================================================================
  # Documents
  # =========================================================================
  /matters/{id}/documents:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      tags: [Documents]
      summary: Register a document on a matter
      description: Registers document metadata; ingestion begins asynchronously. Requires write access.
      operationId: registerDocument
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_name, file_path, file_size, mime_type, sha256_hash]
              properties:
                file_name:
                  type: string
                  minLength: 1
                file_path:
                  type: string
                  minLength: 1
                file_size:
                  type: integer
                  minimum: 1
                mime_type:
                  type: string
                  minLength: 1
                sha256_hash:
                  type: string
                  minLength: 1
      responses:
        '201':
          description: Document registered (status = pending)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags: [Documents]
      summary: List documents for a matter
      operationId: listDocuments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /documents/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Documents]
      summary: Get a document by ID
      operationId: getDocument
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /documents/{id}/status:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      tags: [Documents]
      summary: Update document ingestion status
      description: Used by the ingestion pipeline to update processing state.
      operationId: updateDocumentStatus
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/DocumentStatus'
      responses:
        '200':
          description: Updated document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
