version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: legal-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legal_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legal_password}
      POSTGRES_DB: ${POSTGRES_DB:-legal_ai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legal_user} -d ${POSTGRES_DB:-legal_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongo:7-jammy
    container_name: legal-ai-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-legal_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-legal_password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-legal_ai_checkpoints}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    container_name: legal-ai-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-legal_user}:${POSTGRES_PASSWORD:-legal_password}@postgres:5432/${POSTGRES_DB:-legal_ai}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-32-char-min}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3000"
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  agents:
    build:
      context: ../agents
      dockerfile: Dockerfile
    container_name: legal-ai-agents
    restart: unless-stopped
    environment:
      # Shared secret — MUST match the API service
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-32-char-min}
      # Database connections
      DATABASE_URL: postgresql://${POSTGRES_USER:-legal_user}:${POSTGRES_PASSWORD:-legal_password}@postgres:5432/${POSTGRES_DB:-legal_ai}
      MONGO_URI: mongodb://${MONGO_USER:-legal_user}:${MONGO_PASSWORD:-legal_password}@mongodb:27017/${MONGO_DB:-legal_ai_checkpoints}?authSource=admin
      # Vector store
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}
      PINECONE_INDEX: ${PINECONE_INDEX:-legal-docs}
      # LLM
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-3-5-sonnet-20241022}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.0}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1024}
      # Embeddings
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      # Observability (optional)
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-legal-ai-tool}
      # Node API base URL (for MCP tool calls from agents)
      API_BASE_URL: http://api:3000
    ports:
      - "${AGENTS_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; r=urllib.request.urlopen('http://localhost:8000/health'); sys.exit(0 if r.status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
