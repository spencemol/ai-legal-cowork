# PostgreSQL configuration for Legal AI Tool — production hardening (Task 9.3)
#
# This file is mounted into the postgres container at
#   /etc/postgresql/postgresql.conf
# and enables TLS/SSL so that all connections to Postgres use encrypted transport.
#
# For true Transparent Data Encryption (TDE) at the storage layer, consider:
#   - pg_tde extension (PostgreSQL 17+)
#   - LUKS/dm-crypt on the host volume
#   - Cloud-provider managed encryption (AWS RDS, Azure Database for PostgreSQL)
# See infra/encryption/README.md for options.

# ── TLS / SSL ─────────────────────────────────────────────────────────────────
ssl = on
ssl_cert_file = '/etc/ssl/certs/server.crt'
ssl_key_file  = '/etc/ssl/private/server.key'

# Reject plain-text connections (enforce TLS-only)
# When ssl_min_protocol_version is set, only TLSv1.2+ is accepted.
ssl_min_protocol_version = 'TLSv1.2'

# Prefer server cipher ordering for forward secrecy
ssl_prefer_server_ciphers = on

# Allowed cipher suites (FIPS-compatible subset)
ssl_ciphers = 'HIGH:!aNULL:!MD5'

# ── Connection settings ───────────────────────────────────────────────────────
# Restrict to localhost inside the Docker network; external access via TLS only.
listen_addresses = '*'
port = 5432
max_connections = 200

# ── Logging ───────────────────────────────────────────────────────────────────
log_connections      = on
log_disconnections   = on
log_duration         = off
log_statement        = 'ddl'
log_min_duration_statement = 1000

# ── Security ─────────────────────────────────────────────────────────────────
# Prevent clients from bypassing row-level security
row_security = on

# Disable trust authentication — all connections require password
password_encryption = scram-sha-256
